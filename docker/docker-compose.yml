# 使用外部数据库（不启动 MySQL）
# docker-compose -f docker-compose.yml -f docker-compose.external-db.yml up -d

# 使用内部数据库（启动 MySQL）
#docker-compose --profile internal-db up -d

# 停止服务
# docker-compose -f docker-compose.yml -f docker-compose.external-db.yml down

services:
  # MySQL 数据库服务（仅在使用内部数据库时启动）
  fastdotnet-mysql:
    profiles:
      - internal-db
    image: mysql:8.0
    container_name: fastdotnet-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=fastdotnet_root
      - MYSQL_DATABASE=fastdotnet
      - MYSQL_USER=fastdotnet
      - MYSQL_PASSWORD=fastdotnet
    ports:
      - "3306:3306"
    volumes:
      - fastdotnet-mysql-data:/var/lib/mysql
    networks:
      - fastdotnet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fastdotnetwebapi:
    build:
      context: ..
      dockerfile: ../Dockerfile
    image: fastdotnetwebapi:latest
    container_name: fastdotnetwebapi
    
    # 端口映射：宿主机端口：容器端口 (18889)
    ports:
      - "18889:18889"
    
    environment:
      # ASP.NET Core 环境
      - ASPNETCORE_ENVIRONMENT=Production
      
      # 监听地址（与 Program.cs 中的配置一致）
      - ASPNETCORE_URLS=http://+:18889
      
      # 密钥文件路径配置
      - Marketplace__PrivateKeyPath=/app/secrets/marketplace_private_key.txt
      
      # .NET 版本
      - DOTNET_RUNNING_IN_CONTAINER=true
      
      # 数据库连接字符串（默认使用 MySQL 容器）
      - ConnectionStrings__DefaultConnection=Server=fastdotnet-mysql;Database=fastdotnet;Uid=fastdotnet;Pwd=fastdotnet;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;AllowPublicKeyRetrieval=True;
      - SqlSugar__Connections__0__ConfigId=main
      - SqlSugar__Connections__0__ConnectionString=Server=fastdotnet-mysql;Database=fastdotnet;Uid=fastdotnet;Pwd=fastdotnet;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;AllowPublicKeyRetrieval=True;
      - SqlSugar__Connections__0__DbType=MySql
      - SqlSugar__Connections__0__IsAutoCloseConnection=true
      - SqlSugar__Connections__1__ConfigId=log
      - SqlSugar__Connections__1__ConnectionString=Server=fastdotnet-mysql;Database=fastdotnet_log;Uid=fastdotnet;Pwd=fastdotnet;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;AllowPublicKeyRetrieval=True;
      - SqlSugar__Connections__1__DbType=MySql
      - SqlSugar__Connections__1__IsAutoCloseConnection=true
    
    volumes:
      # 挂载密钥文件（只读模式，安全）
      - ./secrets/marketplace_private_key.txt:/app/secrets/marketplace_private_key.txt:ro
      
      # 持久化数据目录
      - fastdotnet-data:/app/data
      
      # 日志目录（可选）
      - fastdotnet-logs:/app/logs
      
      # 插件目录（重要！用于存放动态加载的插件）
      - fastdotnet-plugins:/app/plugins
      - fastdotnet-wwwroot:/app/wwwroot
    
    restart: unless-stopped
    
    networks:
      - fastdotnet-network
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18889/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 定义网络
networks:
  fastdotnet-network:
    driver: bridge

# 定义数据卷
volumes:
  fastdotnet-mysql-data:
  fastdotnet-data:
  fastdotnet-logs:
  fastdotnet-plugins:
  fastdotnet-wwwroot:
