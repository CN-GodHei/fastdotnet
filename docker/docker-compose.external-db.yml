# 使用外部 MySQL 服务器的配置示例
# 使用方法：docker-compose -f docker-compose.yml -f docker-compose.external-db.yml up -d

services:
  fastdotnetwebapi:
    # 添加额外的 hosts 映射，兼容 Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    environment:
      # 使用 host.docker.internal（Windows/Mac 原生支持，Linux 通过 extra_hosts 支持）
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=fastdotnet;Uid=fastdotnet;Pwd=fastdotnet;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;
      - SqlSugar__Connections__0__ConfigId=main
      - SqlSugar__Connections__0__ConnectionString=Server=host.docker.internal;Database=fastdotnet;Uid=fastdotnet;Pwd=fastdotnet;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;
      - SqlSugar__Connections__0__DbType=MySql
      - SqlSugar__Connections__0__IsAutoCloseConnection=true
      - SqlSugar__Connections__1__ConfigId=log
      - SqlSugar__Connections__1__ConnectionString=Server=host.docker.internal;Database=fastdotnet_log;Uid=fastdotnet_log;Pwd=fastdotnet_log;SslMode=None;AllowLoadLocalInfile=true;AllowUserVariables=true;
      - SqlSugar__Connections__1__DbType=MySql
      - SqlSugar__Connections__1__IsAutoCloseConnection=true