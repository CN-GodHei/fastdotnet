version: '3.8'

services:
  # PostgreSQL 数据库服务
  fastdotnet-pgsql:
    image: postgres:15-alpine
    container_name: fastdotnet-pgsql
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fastdotnet
      - POSTGRES_USER=fastdotnet
      - POSTGRES_PASSWORD=fastdotnet
    ports:
      - "5432:5432"
    volumes:
      - fastdotnet-pgsql-data:/var/lib/postgresql/data
      - ./init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    networks:
      - fastdotnet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastdotnet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fastdotnetwebapi:
    build:
      context: ..
      dockerfile: ../Dockerfile
    image: fastdotnetwebapi:latest
    container_name: fastdotnetwebapi
    
    # 端口映射：宿主机端口：容器端口 (18889)
    ports:
      - "18889:18889"
    
    environment:
      # ASP.NET Core 环境
      - ASPNETCORE_ENVIRONMENT=Production
      
      # 监听地址（与 Program.cs 中的配置一致）
      - ASPNETCORE_URLS=http://+:18889
      
      # 密钥文件路径配置
      - Marketplace__PrivateKeyPath=/app/secrets/marketplace_private_key.txt
      
      # .NET 版本
      - DOTNET_RUNNING_IN_CONTAINER=true
      
      # 数据库连接字符串 (使用 PostgreSQL 容器)
      - ConnectionStrings__DefaultConnection=Host=fastdotnet-pgsql;Database=fastdotnet;Username=fastdotnet;Password=fastdotnet
      - SqlSugar__Connections__0__ConfigId=main
      - SqlSugar__Connections__0__ConnectionString=Host=fastdotnet-pgsql;Database=fastdotnet;Username=fastdotnet;Password=fastdotnet
      - SqlSugar__Connections__0__DbType=PostgreSQL
      - SqlSugar__Connections__0__IsAutoCloseConnection=true
      - SqlSugar__Connections__1__ConfigId=log
      - SqlSugar__Connections__1__ConnectionString=Host=fastdotnet-pgsql;Database=fastdotnet;Username=fastdotnet;Password=fastdotnet
      - SqlSugar__Connections__1__DbType=PostgreSQL
      - SqlSugar__Connections__1__IsAutoCloseConnection=true
      
      # 主数据库配置 (覆盖 appsettings.json 中的默认配置)
      - SqlSugar__EnableSqlExecutionLogging=true
    
    volumes:
      # 挂载密钥文件（只读模式，安全）
      - ./secrets/marketplace_private_key.txt:/app/secrets/marketplace_private_key.txt:ro
      
      # 持久化数据目录
      - fastdotnet-data:/app/data
      
      # 日志目录（可选）
      - fastdotnet-logs:/app/logs
      
      # 插件目录（重要！用于存放动态加载的插件）
      - fastdotnet-plugins:/app/plugins
      - fastdotnet-wwwroot:/app/wwwroot
    
    depends_on:
      fastdotnet-pgsql:
        condition: service_healthy
    
    restart: unless-stopped
    
    networks:
      - fastdotnet-network
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18889/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 定义网络
networks:
  fastdotnet-network:
    driver: bridge

# 定义数据卷
volumes:
  fastdotnet-pgsql-data:
  fastdotnet-data:
  fastdotnet-logs:
  fastdotnet-plugins:
