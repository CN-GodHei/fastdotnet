<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin A - Qiankun Micro App</title>
    <!-- 引入微应用的样式 -->
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <!-- qiankun 微应用的根容器 -->
    <div id="app"></div>

    <!-- 
        qiankun 会加载并执行此 JS 文件。
        该文件应暴露 `bootstrap`, `mount`, `unmount` 生命周期方法。
        注意：在 lib 模式下构建的 UMD 包，其全局变量名应与 vite.config.ts 中定义的 name 一致。
        这里假设 vite.config.ts 中 lib.name 为 'PluginA'，则全局变量名为 'PluginA'。
        但根据生成的 plugin-a-admin.js 内容，导出的生命周期函数直接在全局作用域。
        为了确保兼容性，我们直接引入 JS 文件，qiankun 会处理后续的生命周期调用。
    -->
    <script src="/plugin-a-admin.js"></script>
</body>
</html>
