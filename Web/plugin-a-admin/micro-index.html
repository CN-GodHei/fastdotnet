<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin A - Qiankun Micro App</title>
</head>
<body>
    <div id="app"></div>
    <!-- 加载构建后的 UMD 脚本 -->
    <script src="./plugin-a-admin.js"></script>
    <script>
        // 模拟 qiankun 环境，手动调用 mount
        const microApp = window['PluginA']; // 'PluginA' 是 vite.config.ts 中定义的库名
        if (microApp) {
            microApp.mount({ container: document });
        }
    </script>
</body>
</html>
